# appId must stay com.timescope.desktop: every existing Windows install
# (v0.1.0+) is registered under it, and changing it would make updates install
# side-by-side instead of upgrading in place. macOS uses it as the bundle id.
appId: com.timescope.desktop
productName: TimeScope
copyright: Copyright © 2026 EnesAhmet10000
artifactName: TimeScope-${version}-${arch}.${ext}

directories:
  output: release
  buildResources: assets

files:
  - dist/**
  - package.json

# Native/wasm modules must live outside the asar archive.
asarUnpack:
  - node_modules/koffi/**
  - node_modules/node-sqlite3-wasm/**

extraResources:
  - from: assets
    to: assets

win:
  target:
    - nsis
  icon: assets/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  runAfterFinish: true

mac:
  target:
    - target: dmg
      arch:
        - arm64
  category: public.app-category.productivity
  icon: assets/icon.icns
  # Apple Development certificates are not valid for distributing a DMG.
  # Keep local builds reproducible until a Developer ID certificate is added.
  identity: null

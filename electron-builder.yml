appId: com.enesahmet10000.timescope
productName: TimeScope
copyright: TimeScope
artifactName: TimeScope-${version}-${arch}.${ext}

directories:
  output: release
  buildResources: assets

files:
  - dist/**
  - package.json

# Native/wasm modules must live outside the asar archive.
asarUnpack:
  - node_modules/koffi/**
  - node_modules/node-sqlite3-wasm/**

extraResources:
  - from: assets
    to: assets

mac:
  target:
    - target: dmg
      arch:
        - arm64
  category: public.app-category.productivity
  icon: assets/icon.icns
  # Apple Development certificates are not valid for distributing a DMG.
  # Keep local builds reproducible until a Developer ID certificate is added.
  identity: null
